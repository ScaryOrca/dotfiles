theme = "calm"

[editor]
rulers = [80]
line-number = "relative"
color-modes = true
cursorline = true
shell = ["oksh", "-c"]
gutters = ["diagnostics", "spacer", "diff"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = false

[keys.insert]
j = { j = "normal_mode" }
